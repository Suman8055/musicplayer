<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000814" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MusicPlayer" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%sveltekit.assets%/icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="%sveltekit.assets%/icon-120.png" />
    <link rel="icon" href="%sveltekit.assets%/icon-192.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />

    <!-- Preconnect: eliminates DNS+TLS round-trip on first API call (~300-800ms on mobile) -->
    <link rel="preconnect" href="https://jiosaavn-api-sigma-sandy.vercel.app" />
    <link rel="dns-prefetch" href="https://jiosaavn-api-sigma-sandy.vercel.app" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('%sveltekit.assets%/sw.js', {
          updateViaCache: 'none'
        }).then(reg => {
          // Ask the waiting/installing SW for its version, then notify the app
          function notifyIfNewer(sw) {
            if (!sw) return;
            const mc = new MessageChannel();
            mc.port1.onmessage = e => {
              if (e.data?.type === 'SW_VERSION') {
                window.dispatchEvent(new CustomEvent('sw-update-ready', {
                  detail: { waiting: sw, newVersion: e.data.version }
                }));
              }
            };
            sw.postMessage({ type: 'GET_VERSION' }, [mc.port2]);
          }

          // Already waiting on page load (e.g. user had the tab open during a deploy)
          if (reg.waiting) notifyIfNewer(reg.waiting);

          reg.addEventListener('updatefound', () => {
            const sw = reg.installing;
            if (!sw) return;
            sw.addEventListener('statechange', () => {
              if (sw.state === 'installed' && navigator.serviceWorker.controller)
                notifyIfNewer(sw);
            });
          });

          // When the new SW takes control, reload to load fresh assets
          navigator.serviceWorker.addEventListener('controllerchange', () =>
            setTimeout(() => location.reload(), 400));
        }).catch(() => {});
      }
    </script>
  </body>
</html>
