<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000814" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MusicPlayer" />

    <!-- Icons -->
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%sveltekit.assets%/icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="%sveltekit.assets%/icon-120.png" />
    <link rel="icon" href="%sveltekit.assets%/icon-192.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.json" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('%sveltekit.assets%/sw.js', {
          updateViaCache: 'none'
        }).then(reg => {
          if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          reg.addEventListener('updatefound', () => {
            const sw = reg.installing;
            sw && sw.addEventListener('statechange', () => {
              if (sw.state === 'installed' && navigator.serviceWorker.controller)
                sw.postMessage({ type: 'SKIP_WAITING' });
            });
          });
          navigator.serviceWorker.addEventListener('controllerchange', () =>
            setTimeout(() => location.reload(), 400));
        }).catch(() => {});
      }
    </script>
  </body>
</html>
